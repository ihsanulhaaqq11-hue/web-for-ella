<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Spesial ✨</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #0f172a; color: white;
            text-align: center; overflow-x: hidden;
        }

        /* Navigasi / Opsi Tab & Tombol Kembali */
        .navigasi {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%); z-index: 999;
            background: rgba(255, 255, 255, 0.1); padding: 8px;
            border-radius: 30px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; gap: 8px; align-items: center;
        }

        .navigasi a, .navigasi button {
            background: transparent; color: white; border: none;
            padding: 8px 15px; border-radius: 20px; font-size: 13px;
            font-weight: bold; cursor: pointer; transition: all 0.3s ease;
            text-decoration: none; display: inline-flex; align-items: center;
        }

        .navigasi button.aktif {
            background: #e94560;
            box-shadow: 0 4px 10px rgba(233, 69, 96, 0.4);
        }

        .btn-home {
            background: rgba(255, 255, 255, 0.2) !important;
        }

        .tab-konten { display: none; width: 100vw; min-height: 100vh; }

        /* Galeri Gabungan (Foto & Video) */
        #wadah-media { padding-top: 100px; padding-bottom: 50px; overflow-y: auto; box-sizing: border-box; }
        .grid-galeri {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; padding: 0 30px; max-width: 1200px; margin: 0 auto; align-items: start;
        }
        
        .grid-galeri img, .grid-galeri video {
            width: 100%; height: auto; border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.3s ease; 
        }
        
        .grid-galeri img { cursor: pointer; }
        .grid-galeri img:hover { transform: scale(1.03); }
        
        .grid-galeri video { 
            background-color: #000; outline: none; 
            /* Menjaga agar video melengkung rapi seperti foto */
            border-radius: 15px; 
        }

        /* Lightbox untuk Foto */
        #layar-penuh {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9);
            z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); cursor: pointer;
        }
        #layar-penuh img { max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        #tombol-tutup { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; }

        /* Galeri 360 */
        #wadah-360 { height: 100vh; }
        #panorama { width: 100%; height: 100%; border: none; }
        .tombol-panah {
            position: absolute; top: 50%; transform: translateY(-50%); z-index: 10;
            background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid rgba(255, 255, 255, 0.3);
            width: 50px; height: 50px; border-radius: 50%; font-size: 24px; font-weight: bold; cursor: pointer;
            backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center;
        }
        .panah-kiri { left: 20px; } .panah-kanan { right: 20px; }
        .indikator {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(0, 0, 0, 0.6); padding: 8px 15px; border-radius: 15px; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="navigasi">
        <a href="appgaleritrck.html" class="btn-home">🏠 Menu</a>
        <button id="btn-media" onclick="bukaTab('media')">Galeri Momen</button>
        <button id="btn-360" onclick="bukaTab('360')">Memori 360°</button>
    </div>

    <!-- TAMPILAN GABUNGAN FOTO & VIDEO -->
    <div id="wadah-media" class="tab-konten">
        <h2 style="margin-bottom: 30px;">Galeri Memori ✨</h2>
        <div class="grid-galeri" id="galeri-media"></div>
    </div>

    <!-- EFEK LAYAR PENUH (HANYA UNTUK FOTO) -->
    <div id="layar-penuh" onclick="tutupFotoFull()">
        <span id="tombol-tutup">&times;</span>
        <img id="foto-full" src="" alt="Foto Penuh">
    </div>

    <!-- TAMPILAN FOTO 360 -->
    <div id="wadah-360" class="tab-konten">
        <div id="panorama"></div>
        <button class="tombol-panah panah-kiri" onclick="geserFoto360(-1)">❮</button>
        <button class="tombol-panah panah-kanan" onclick="geserFoto360(1)">❯</button>
        <div class="indikator" id="teks-indikator-360">Memuat foto 360...</div>
    </div>

    <script>
        let sudahLoadMedia = false, sudahLoad360 = false;
        let viewer360, urutanFoto360 = [], indeksSekarang360 = 0;

        function bukaTab(jenis) {
            document.getElementById("wadah-media").style.display = "none";
            document.getElementById("wadah-360").style.display = "none";
            document.getElementById("btn-media").classList.remove("aktif");
            document.getElementById("btn-360").classList.remove("aktif");

            document.getElementById("wadah-" + jenis).style.display = "block";
            document.getElementById("btn-" + jenis).classList.add("aktif");

            if (jenis === "media" && !sudahLoadMedia) muatMediaGabungan();
            if (jenis === "360" && !sudahLoad360) muatFoto360();
        }

        function muatMediaGabungan() {
            // Cukup panggil file foto1.json saja
            fetch('foto1.json')
                .then(res => res.json())
                .then(data => {
                    const wadahGaleri = document.getElementById("galeri-media");
                    
                    data.forEach(link => {
                        // Mengambil teks setelah titik terakhir (misal: jpg, png, atau mp4)
                        let ekstensi = link.split('.').pop().toLowerCase();
                        
                        // Jika itu video mp4 atau webm
                        if (ekstensi === 'mp4' || ekstensi === 'webm' || ekstensi === 'mov') {
                            wadahGaleri.innerHTML += `<video src="${link}" controls preload="metadata"></video>`;
                        } 
                        // Jika itu foto biasa
                        else {
                            wadahGaleri.innerHTML += `<img src="${link}" alt="Memori" onclick="bukaFotoFull(this.src)">`;
                        }
                    });
                    
                    sudahLoadMedia = true;
                })
                .catch(err => console.error("Gagal muat foto1.json", err));
        }

        function bukaFotoFull(urlFoto) {
            document.getElementById("foto-full").src = urlFoto;
            document.getElementById("layar-penuh").style.display = "flex";
        }

        function tutupFotoFull() { 
            document.getElementById("layar-penuh").style.display = "none"; 
        }

        function muatFoto360() {
            fetch('data.json')
                .then(res => res.json())
                .then(data => {
                    let daftarScene = {};
                    data.forEach((link, index) => {
                        let namaID = "foto360_" + (index + 1);
                        urutanFoto360.push(namaID);
                        daftarScene[namaID] = { "type": "equirectangular", "panorama": link };
                    });
                    
                    viewer360 = pannellum.viewer('panorama', {
                        "default": { "firstScene": urutanFoto360[0], "autoLoad": true, "sceneFadeDuration": 1000, "autoRotate": -2 },
                        "scenes": daftarScene
                    });
                    
                    document.getElementById("teks-indikator-360").innerText = `Foto 1 dari ${urutanFoto360.length}`;
                    sudahLoad360 = true;
                })
                .catch(err => console.error("Gagal muat data.json", err));
        }

        function geserFoto360(arah) {
            if (urutanFoto360.length === 0) return; 
            indeksSekarang360 += arah;
            if (indeksSekarang360 >= urutanFoto360.length) indeksSekarang360 = 0;
            else if (indeksSekarang360 < 0) indeksSekarang360 = urutanFoto360.length - 1;
            viewer360.loadScene(urutanFoto360[indeksSekarang360]);
            document.getElementById("teks-indikator-360").innerText = `Foto ${indeksSekarang360 + 1} dari ${urutanFoto360.length}`;
        }

        // Buka tab media gabungan pertama kali web diakses
        bukaTab('media');
    </script>
</body>
</html>
