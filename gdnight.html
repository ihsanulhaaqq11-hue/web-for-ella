<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Night, Ella ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            transition: background 1s ease;
            overflow: hidden;
            text-align: center;
        }

        #night-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease;
            z-index: 10;
        }

        .content { z-index: 5; }

        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            background: #ff4d6d;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: transform 0.3s;
        }

        button:active { transform: scale(0.9); }

        .stars { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }

        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>
    <div id="night-overlay"></div>

    <div class="content" id="main-content">
        <h1>Siap untuk istirahat, Ella?</h1>
        <button onclick="startSleep()">Klik untuk matikan lampu</button>
    </div>

    <script>
        // Membuat bintang-bintang di latar belakang
        const starContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starContainer.appendChild(star);
        }

        // Fungsi interaktif saat tombol ditekan
        function startSleep() {
            document.getElementById('night-overlay').style.opacity = "0.8";
            document.getElementById('main-content').innerHTML = `
                <h1>Good Night, Ella ❤️</h1>
                <p>Mimpi indah ya, istirahat yang nyenyak.</p>
                <p>Sampai ketemu besok!</p>
            `;
            // Mengubah latar belakang jadi lebih gelap
            document.body.style.background = "#000";
        }
    </script>
</body>
</html>
