<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Hand Tracking & Saranghae ✨</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; background-color: #111; color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; overflow: hidden;
        }

        .btn-home {
            position: fixed; top: 15px; left: 15px; z-index: 999;
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 8px 15px; border-radius: 20px; font-size: 13px;
            font-weight: bold; text-decoration: none; backdrop-filter: blur(5px);
        }

        h2 { margin-top: 25px; margin-bottom: 5px; color: #00FFFF; font-size: 20px; }
        #pesan-status {
            margin-bottom: 10px; font-size: 13px; color: #ff9f43; font-weight: bold;
            min-height: 35px; display: flex; align-items: center; justify-content: center;
        }

        .kamera-wrapper { width: 100%; max-width: 500px; position: relative; display: flex; justify-content: center; }
        canvas {
            width: 100%; max-height: 72vh; object-fit: contain;
            border: 2px solid #333; border-radius: 15px; background-color: #000;
            transform: scaleX(-1); display: block; box-shadow: 0 10px 30px rgba(0,255,255,0.2);
        }
        video { display: none; }
    </style>
</head>
<body>

    <a href="appgaleritrck.html" class="btn-home">🏠 Menu</a>

    <h2>Saranghae & Hologram AI ✨</h2>
    <div id="pesan-status">Memuat AI... Mohon tunggu.</div>
    
    <div class="kamera-wrapper">
        <video id="input_video" autoplay playsinline></video>
        <canvas id="output_canvas" width="640" height="480"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const pesanStatus = document.getElementById('pesan-status');

        function onResults(results) {
            if (videoElement.videoWidth > 0 && canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length === 2) {
                pesanStatus.innerHTML = "✨ Efek Invert 2 Tangan Aktif! ✨";
                pesanStatus.style.color = "#00FFFF";
            } else if (results.multiHandLandmarks && results.multiHandLandmarks.length === 1) {
                pesanStatus.innerHTML = "💖 Bentuk jari gaya Saranghae (Korea) untuk memunculkan Love!";
                pesanStatus.style.color = "#ff6b81";
            } else {
                pesanStatus.innerText = "Tangan tidak terdeteksi...";
                pesanStatus.style.color = "#ff4757";
            }
            
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: 'rgba(0, 255, 0, 0.2)', lineWidth: 2});
                    drawLandmarks(canvasCtx, landmarks, {color: 'rgba(255, 0, 0, 0.2)', lineWidth: 1, radius: 2});
                }

                // === 1 TANGAN: DETEKSI GESTUR SARANGHAE (KOREAN FINGER HEART) ===
                if (results.multiHandLandmarks.length === 1) {
                    const tangan = results.multiHandLandmarks[0];
                    const jempolTip = tangan[4];   // Ujung jempol
                    const telunjukTip = tangan[8]; // Ujung telunjuk

                    const jx = jempolTip.x * canvasElement.width;
                    const jy = jempolTip.y * canvasElement.height;
                    const tx = telunjukTip.x * canvasElement.width;
                    const ty = telunjukTip.y * canvasElement.height;

                    // Hitung jarak antara ujung jempol dan ujung telunjuk
                    const dx = tx - jx;
                    const dy = ty - jy;
                    const jarakJari = Math.sqrt(dx * dx + dy * dy);

                    // Syarat Gestur Saranghae:
                    // 1. Ujung jempol dan telunjuk harus sangat dekat (jarak pixel kecil, misal di bawah 50 pixel tergantung resolusi)
                    // 2. Posisi vertikal telunjuk harus berada di atas atau bersilangan dengan jempol (ty < jy atau bersilangan tipis)
                    const isSaranghae = jarakJari < 45; 

                    if (isSaranghae) {
                        const tengahX = jx + (dx / 2);
                        const tengahY = jy + (dy / 2);

                        canvasCtx.save();
                        canvasCtx.translate(tengahX, tengahY);
                        canvasCtx.font = `50px sans-serif`; // Ukuran tetap yang manis untuk finger heart
                        canvasCtx.textAlign = 'center';
                        canvasCtx.textBaseline = 'middle';
                        canvasCtx.shadowColor = '#ff4757';
                        canvasCtx.shadowBlur = 25;
                        canvasCtx.fillText('❤️', 0, 0);
                        canvasCtx.restore();
                    }
                }
                // === 2 TANGAN: BINGKAI HOLOGRAM INVERT FLEKSIBEL ===
                else if (results.multiHandLandmarks.length === 2) {
                    const tangan1 = results.multiHandLandmarks[0];
                    const tangan2 = results.multiHandLandmarks[1];

                    const getPixel = (titikJari) => ({
                        x: titikJari.x * canvasElement.width,
                        y: titikJari.y * canvasElement.height
                    });

                    const j1 = getPixel(tangan1[4]); 
                    const t1 = getPixel(tangan1[8]); 
                    const j2 = getPixel(tangan2[4]); 
                    const t2 = getPixel(tangan2[8]); 
                    const semuaTitik = [j1, t1, j2, t2];

                    canvasCtx.save();
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(j1.x, j1.y);
                    canvasCtx.lineTo(t1.x, t1.y);
                    canvasCtx.lineTo(t2.x, t2.y);
                    canvasCtx.lineTo(j2.x, j2.y);
                    canvasCtx.closePath();
                    canvasCtx.clip();

                    canvasCtx.filter = 'invert(100%)';
                    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                    canvasCtx.restore();

                    canvasCtx.beginPath();
                    canvasCtx.moveTo(j1.x, j1.y);
                    canvasCtx.lineTo(t1.x, t1.y);
                    canvasCtx.lineTo(t2.x, t2.y);
                    canvasCtx.lineTo(j2.x, j2.y);
                    canvasCtx.closePath();

                    canvasCtx.lineWidth = 4;
                    canvasCtx.strokeStyle = '#00FFFF';
                    canvasCtx.shadowColor = '#00FFFF';
                    canvasCtx.shadowBlur = 15;
                    canvasCtx.stroke();
                    canvasCtx.shadowBlur = 0; 

                    semuaTitik.forEach(titik => {
                        canvasCtx.beginPath();
                        canvasCtx.arc(titik.x, titik.y, 6, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = '#FFD700';
                        canvasCtx.fill();
                        canvasCtx.stroke();
                    });
                }
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: undefined, height: undefined 
        });
        camera.start();
    </script>
</body>
</html>
