<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Edit JSON</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #1a1a2e;
            color: white;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h2 { color: #00FFFF; text-align: center; }
        .kotak-input { background: #16213e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        label { display: block; margin-top: 15px; font-size: 14px; font-weight: bold; color: #ff9f43; }
        input[type="text"], input[type="password"], textarea {
            width: 100%; padding: 10px; margin-top: 5px;
            border-radius: 5px; border: 1px solid #0f3460;
            background: #0f3460; color: white; box-sizing: border-box;
        }
        textarea { height: 200px; font-family: monospace; resize: vertical; }
        button {
            margin-top: 20px; padding: 12px 20px; border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer; width: 100%; font-size: 16px;
        }
        .btn-muat { background-color: #0984e3; color: white; }
        .btn-simpan { background-color: #00b894; color: white; display: none; }
        #status { margin-top: 15px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

    <h2>🔧 Admin Panel Memori</h2>
    <p style="text-align: center; font-size: 13px; color: #ccc;">Khusus Ikhsan: Gunakan halaman ini untuk menambah/mengedit isi JSON.</p>

    <div class="kotak-input">
        <label>Token GitHub (ghp_...):</label>
        <input type="password" id="token" placeholder="Masukkan token rahasia di sini...">

        <label>Nama Akun GitHub-mu:</label>
        <input type="text" id="owner" placeholder="Contoh: ihsanulhaaqq11-hue" value="ihsanulhaaqq11-hue">

        <label>Nama Repository-mu:</label>
        <input type="text" id="repo" placeholder="Contoh: web-for-ella" value="web-for-ella">

        <label>Nama File yang Ingin Diedit:</label>
        <input type="text" id="path" placeholder="Contoh: foto1.json" value="foto1.json">

        <button class="btn-muat" onclick="muatFile()">📥 Buka File Ini</button>

        <div id="editor-area" style="display: none;">
            <label>Isi File (Edit dengan hati-hati):</label>
            <textarea id="konten"></textarea>
            <button class="btn-simpan" id="btn-simpan" onclick="simpanFile()">💾 Simpan Perubahan ke GitHub</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        let fileSha = ""; // Menyimpan ID file untuk di-update

        // Fungsi Bantuan Konversi Teks ke format GitHub (Base64)
        function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
        function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

        async function muatFile() {
            const token = document.getElementById('token').value;
            const owner = document.getElementById('owner').value;
            const repo = document.getElementById('repo').value;
            const path = document.getElementById('path').value;
            const status = document.getElementById('status');

            if(!token) return status.innerHTML = "❌ Token GitHub harus diisi!";
            
            status.innerHTML = "⏳ Membaca file dari GitHub...";

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if (!response.ok) throw new Error("File tidak ditemukan atau Token salah.");

                const data = await response.json();
                fileSha = data.sha; // Ambil kode unik file

                // GitHub menyimpan isi file dalam bentuk sandi Base64, kita pecahkan kodenya:
                const isiAsli = b64_to_utf8(data.content);
                
                document.getElementById('konten').value = isiAsli;
                document.getElementById('editor-area').style.display = "block";
                document.getElementById('btn-simpan').style.display = "block";
                status.innerHTML = "✅ File berhasil dimuat! Silakan edit di bawah.";
                status.style.color = "#00b894";

            } catch (error) {
                status.innerHTML = "❌ Gagal: " + error.message;
                status.style.color = "#d63031";
            }
        }

        async function simpanFile() {
            const token = document.getElementById('token').value;
            const owner = document.getElementById('owner').value;
            const repo = document.getElementById('repo').value;
            const path = document.getElementById('path').value;
            const kontenBaru = document.getElementById('konten').value;
            const status = document.getElementById('status');

            status.innerHTML = "⏳ Sedang menyimpan ke GitHub...";
            document.getElementById('btn-simpan').disabled = true;

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Update " + path + " lewat Admin Panel",
                        content: utf8_to_b64(kontenBaru), // Sandikan kembali ke Base64
                        sha: fileSha // Kirim kode unik agar GitHub tahu file mana yang ditimpa
                    })
                });

                if (!response.ok) throw new Error("Gagal menyimpan file.");

                status.innerHTML = "🎉 Berhasil Disimpan! Cek web galeri dalam 1 menit.";
                status.style.color = "#00b894";
            } catch (error) {
                status.innerHTML = "❌ Gagal: " + error.message;
                status.style.color = "#d63031";
            } finally {
                document.getElementById('btn-simpan').disabled = false;
            }
        }
    </script>
</body>
</html>
